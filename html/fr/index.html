<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/style.css">
    <title>Document</title>
</head>
<body>
    <p>bonjour tout le monde</p>
    <form action="/ajouter-donnee" method="POST">
        <input type="text" name="nom" placeholder="Ton nom" required>
        <input type="email" name="email" placeholder="Ton email" required>
        <button type="submit">Envoyer à la base</button>
    </form>

    <textarea name="texte" placeholder="Ton message"></textarea>

    <h2>Messages reçus :</h2>
        <div id="liste-messages">
            <p>Chargement des messages...</p>
        </div>

        <script>
            // On appelle la route /voir-tout que tu as déjà créée
            fetch('/voir-tout-json') 
                .then(response => response.json())
                .then(messages => {
                    const div = document.getElementById('liste-messages');
                    div.innerHTML = ''; // On vide le message de chargement
        
                    if (messages.length === 0) {
                        div.innerHTML = '<p>Aucun message pour le moment.</p>';
                        return;
                    }
        
                    // On crée une liste pour chaque message
                    messages.forEach(msg => {
                        const p = document.createElement('p');
                        p.style.borderBottom = "1px solid #ccc";
                        p.innerHTML = `<strong>${msg.nom}</strong> : ${msg.texte || 'Pas de texte'}`;
                        div.appendChild(p);
                    });
                })
                .catch(err => console.error("Erreur d'affichage :", err));
        </script>
</body>
</html>
